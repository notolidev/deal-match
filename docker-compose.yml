name: deal-match

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dealmatch}
      POSTGRES_USER: ${POSTGRES_USER:-dealmatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/web/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      # Exposed publicly so Vercel can reach it. Restrict with the host
      # firewall (ufw / cloud security group) to Vercel's IP ranges in prod,
      # or keep this commented out and tunnel via the runner.
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dealmatch}"]
      interval: 10s
      timeout: 5s
      retries: 5

  runner:
    build:
      context: .
      dockerfile: apps/runner/Dockerfile
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      PORT: "8080"
      RUNNER_TOKEN: ${RUNNER_TOKEN:?set RUNNER_TOKEN in .env}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env (e.g. runner.example.com)}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - runner

volumes:
  pgdata:
  caddy_data:
  caddy_config:
